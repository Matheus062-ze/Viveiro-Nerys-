<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Estação Verde</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial;margin:0;background:#f1f8e9;}
header{background:#1b5e20;color:white;text-align:center;padding:15px;}
nav{display:flex;justify-content:center;background:#2e7d32;}
nav button{background:none;border:none;color:white;padding:15px 20px;cursor:pointer;font-size:16px;}
nav button:hover{background:#1b5e20;}
.tela{display:none;padding:20px;}
.ativa{display:block;}
.caixa{background:white;padding:20px;border-radius:10px;box-shadow:0 0 8px rgba(0,0,0,0.1);}
input,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{background:#2e7d32;color:white;border:none;}
button:hover{background:#1b5e20;}
.lista p{background:#e8f5e9;padding:8px;border-radius:6px;margin:5px 0;}
.total{font-weight:bold;margin-top:10px;}
.login-box{max-width:400px;margin:100px auto;}
</style>
</head>
<body>

<div id="login" class="login-box">
<div class="caixa">
<h2>🌿 Estação Verde</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
<p id="erroLogin" style="color:red;"></p>
</div>
</div>

<div id="sistema" style="display:none;">
<header>
<h1>🌿 Estação Verde</h1>
<button onclick="sair()" style="position:absolute;right:20px;top:15px;background:#c62828;width:auto;padding:5px 10px;">Sair</button>
</header>
<nav>
<button onclick="trocar('cadastro')">Cadastro</button>
<button onclick="trocar('estoque')">Estoque</button>
<button onclick="trocar('venda')">Venda</button>
<button onclick="trocar('historico')">Histórico</button>
</nav>

<div id="cadastro" class="tela ativa">
<div class="caixa">
<h2>Cadastro</h2>
<input id="nome" placeholder="Nome da Planta">
<input id="valor" type="number" placeholder="Valor">
<input id="quantidade" type="number" placeholder="Quantidade">
<button onclick="cadastrar()">Cadastrar</button>
</div>
</div>

<div id="estoque" class="tela">
<div class="caixa">
<h2>Estoque</h2>
<div id="listaEstoque"></div>
</div>
</div>

<div id="venda" class="tela">
<div class="caixa">
<h2>Venda</h2>
<input id="busca" placeholder="Nome da Planta">
<input id="qtdVenda" type="number" placeholder="Quantidade">
<button onclick="adicionar()">Adicionar</button>
<h3>Carrinho</h3>
<div id="carrinho"></div>
<p class="total" id="totalAtual">Total: R$ 0.00</p>
<button onclick="finalizar()">Finalizar Venda</button>
<p id="mensagem"></p>
</div>
</div>

<div id="historico" class="tela">
<div class="caixa">
<h2>Histórico</h2>
<div id="listaHistorico"></div>
<p class="total" id="totalDia"></p>
</div>
</div>
</div>

<script>
const SENHA="1234";
let produtos=JSON.parse(localStorage.getItem("produtos"))||[];
let historico=JSON.parse(localStorage.getItem("historico"))||[];
let totalDia=JSON.parse(localStorage.getItem("totalDia"))||0;
let carrinho=[];
function salvar(){localStorage.setItem("produtos",JSON.stringify(produtos));
localStorage.setItem("historico",JSON.stringify(historico));
localStorage.setItem("totalDia",JSON.stringify(totalDia));}
function entrar(){let s=document.getElementById("senha").value;
if(s===SENHA){document.getElementById("login").style.display="none";
document.getElementById("sistema").style.display="block";atualizarEstoque();atualizarHistorico();}
else{document.getElementById("erroLogin").innerText="Senha incorreta!";}}
function sair(){ location.reload(); }
function trocar(tela){document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
document.getElementById(tela).classList.add("ativa");}
function cadastrar(){let nome=document.getElementById("nome").value.trim();
let valor=parseFloat(document.getElementById("valor").value);
let qtd=parseInt(document.getElementById("quantidade").value);
if(!nome||isNaN(valor)||isNaN(qtd)){alert("Preencha tudo");return;}
produtos.push({nome,valor,qtd});salvar();atualizarEstoque();
document.getElementById("nome").value="";
document.getElementById("valor").value="";
document.getElementById("quantidade").value="";}
function atualizarEstoque(){let div=document.getElementById("listaEstoque");div.innerHTML="";
produtos.forEach(p=>{div.innerHTML+=`<p>${p.nome} | R$ ${p.valor.toFixed(2)} | Estoque: ${p.qtd}</p>`;});}
function adicionar(){let nomeBusca=document.getElementById("busca").value.toLowerCase().trim();
let qtd=parseInt(document.getElementById("qtdVenda").value);
if(isNaN(qtd)||qtd<=0){alert("Quantidade inválida");return;}
let produto=produtos.find(p=>p.nome.toLowerCase().includes(nomeBusca));
if(!produto){alert("Não encontrado");return;}
if(produto.qtd<qtd){alert("Estoque insuficiente");return;}
let total=produto.valor*qtd;
carrinho.push({nome:produto.nome,qtd,total});
atualizarCarrinho();
document.getElementById("busca").value="";
document.getElementById("qtdVenda").value="";}
function atualizarCarrinho(){let div=document.getElementById("carrinho");div.innerHTML="";let total=0;
carrinho.forEach(item=>{div.innerHTML+=`<p>${item.nome} | Qtd: ${item.qtd} | R$ ${item.total.toFixed(2)}</p>`;total+=item.total;});
document.getElementById("totalAtual").innerHTML="Total: R$ "+total.toFixed(2);}
function finalizar(){if(carrinho.length===0){alert("Carrinho vazio");return;}
let totalVenda=0;
carrinho.forEach(item=>{let prod=produtos.find(p=>p.nome===item.nome);prod.qtd-=item.qtd;totalVenda+=item.total;});
historico.push({total:totalVenda});totalDia+=totalVenda;carrinho=[];salvar();atualizarCarrinho();atualizarEstoque();atualizarHistorico();
document.getElementById("mensagem").innerHTML="Venda concluída! R$ "+totalVenda.toFixed(2);}
function atualizarHistorico(){let div=document.getElementById("listaHistorico");div.innerHTML="";
historico.forEach((v,i)=>{div.innerHTML+=`<p>Venda ${i+1} - R$ ${v.total.toFixed(2)}</p>`;});
document.getElementById("totalDia").innerHTML="Total do dia: R$ "+totalDia.toFixed(2);}
if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js");}
</script>
</body>
</html>
